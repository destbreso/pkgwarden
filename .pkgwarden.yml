# PKGWARDEN — Security Configuration
# Package Guardian With Auditing, Reporting & Detection
# Centralized policy layer for package security across any package manager

# Severity thresholds
severity:
  threshold: critical    # Block installs: low | medium | high | critical
  failCI: high          # Fail CI pipelines: low | medium | high | critical

# Source code scanning rules (pre-install analysis)
rules:
  installScripts: true        # Detect suspicious install scripts (preinstall/postinstall)
  networkAccess: true           # Detect network calls (fetch, http.request, etc.)
  filesystemAccess: true     # Detect sensitive fs operations (.env, .ssh, etc.)
  codeExecution: true           # Detect eval(), new Function(), child_process
  obfuscation: true               # Detect obfuscated/encoded code
  dataExfiltration: true     # Detect data exfiltration patterns
  typosquatting: true           # Check for typosquat name confusion
  hiddenChars: true               # Detect hidden Unicode, bidi overrides, homoglyphs
  deprecatedPackages: true # Warn about deprecated packages
  unmaintained: true             # Warn about stale packages (2+ years)

# Security policies (translated to PM-specific rc settings)
policies:
  enforceRcSecurity: true     # Audit & enforce PM rc security settings
  enforceLockfile: true             # Require lockfile present
  enforceExactVersions: false   # No ^ or ~ in versions
  auditOnInstall: true               # Run PM audit during install
  registryUrl: https://registry.npmjs.org/

# Package allowlist (skip scanning for these)
allowlist: []


# Package blocklist (always block these)
blocklist: []


# File patterns to ignore during scans
ignorePatterns:
  - "node_modules"
  - ".git"
  - "test"
  - "__tests__"
  - "*.test.js"
  - "*.spec.js"
